[project]
name = "unmsm-sum-api"
version = "0.1.0"
description = "Unofficial client for observed UNMSM SUM system endpoints."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "GPL-3.0-only" }
authors = [
  { name = "GadCoder", email = "71470937+GadCoder@users.noreply.github.com" },
]
keywords = [
  "unmsm",
  "sum",
  "portal-unmsm",
  "sdk",
  "api-client",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.7.0",
]

[project.urls]
Homepage = "https://github.com/GadCoder/UNMSM-SUM-API#readme"
Repository = "https://github.com/GadCoder/UNMSM-SUM-API"
Issues = "https://github.com/GadCoder/UNMSM-SUM-API/issues"
Documentation = "https://github.com/GadCoder/UNMSM-SUM-API/tree/main/docs"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true
