[project]
name = "unmsm-sum-api"
version = "0.1.0"
description = "Cliente no oficial para endpoints observados del sistema SUM de la UNMSM."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true
